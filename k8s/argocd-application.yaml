apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cicdtest-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/gauravvohra18/cicdtest.git'
    targetRevision: HEAD
    path: 'k8s' # FIXED: Pointing Argo CD to your actual k8s directory
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: test-environment
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true