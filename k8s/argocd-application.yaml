apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cicdtest-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    # Point this to your actual repository
    repoURL: 'https://github.com/gauravvohra18/cicdtest.git'
    targetRevision: HEAD
    path: '.'                 # Point to the directory containing your deployment.yaml file
  destination:
    server: 'https://kubernetes.default.svc' # Directs deployment to the same AKS cluster
    namespace: test-environment              # Target namespace matching your application manifests
  syncPolicy:
    automated:
      prune: true      # Automatically removes objects from AKS if deleted from Git
      selfHeal: true   # Overwrites manual cluster overrides to prevent configuration drift
    syncOptions:
      - CreateNamespace=true                 # Safety step to guarantee namespace creation