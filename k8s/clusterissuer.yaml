# ===============================================
# ClusterIssuer for Let's Encrypt Production SSL
# ===============================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod       # This name matches the annotation in your Ingress manifest
spec:
  acme:
    # Let's Encrypt Production API
    server: https://acme-v02.api.letsencrypt.org/directory
    
    # Your automated expiration notifications will be sent here
    email: gauravvohrdevops@gmail.com
    
    # Secret storing ACME account private key
    privateKeySecretRef:
      name: letsencrypt-prod
      
    # Fixed indentation for the HTTP-01 Solver configuration
    solvers:
    - http01:
        ingress:
          ingressClassName: nginx  # Modern syntax to target your Nginx Ingress Controller