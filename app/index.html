<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Test App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-indigo-950 text-white min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full mx-4 p-8 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 shadow-2xl text-center">
        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 mb-6">
            <span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse mr-2"></span>
            Successfully Deployed
        </span>

        <h1 class="text-3xl font-extrabold tracking-tight mb-2 bg-gradient-to-r from-blue-400 to-teal-300 bg-clip-text text-transparent">
            GitOps Pipeline Test-2
        </h1>
        
        <p class="text-slate-300 mb-8 text-sm leading-relaxed">
            If you can see this page, your Jenkins build and Argo CD synchronization to AKS are working perfectly.
        </p>

        <div class="bg-black/30 rounded-xl p-4 border border-white/5">
            <span class="text-xs text-slate-400 block uppercase tracking-wider font-semibold mb-1">Application Version</span>
            <span class="text-2xl font-mono font-bold text-amber-400" id="version">v1.6.0</span>
        </div>
    </div>

</body>
</html>
